spring.application.name=nishikigi_emon
server.servlet.context-path=/nishikigi

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#URL
spring.datasource.url=jdbc:mysql://localhost:3306/nishikigi_db
#ユーザー名
spring.datasource.username=nishikigi_user
#パスワード
spring.datasource.password=adminpass

# アップロードサイズの上限を上げる
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
# 確認画面（hidden）で巨大なデータを送るための制限解除
server.tomcat.max-http-form-post-size=-1

## DevToolsによる裏での勝手な自動再起動を完全にフリーズさせる
#spring.devtools.restart.enabled=false
<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>処理完了</title>


</head>

<body>

	<header>

		<!-- 上段 -->
		<div class="header-top">

			<!-- 左側：ロゴ＋ホームリンク -->
			<div class="logo-area">
				<a href="home.html">
					<!-- アイコン画像 -->
					<img src="icon.png" alt="アイコン" class="logo-img">
				</a>
			</div>

			<!-- 右側：ユーザ名＋ログアウト -->
			<div class="user-area">

				<!-- ログイン中の場合 -->
				<span th:if="${session.loginUser != null}">
					<span th:text="${session.loginUser.username}">ゲスト</span>さん
					<form th:action="@{/logout}" method="post" class="logout-form">
						<button type="submit">ログアウト</button>
					</form>
				</span>
				<!-- 未ログインの場合 -->
				<span th:unless="${session.loginUser != null}">
					<a th:href="@{/login}">ログイン</a>
				</span>

			</div>

		</div>

		<!-- 下段：現場名 -->
		<div class="site-info">
			<td th:text="${session.siteId}"></td>
		</div>

	</header>

	<main>

		<div class="complete-card">

			<div class="check-mark">✔</div>

			<div class="title">処理が完了しました</div>

			<div class="message">
				ご入力いただいた内容は正常に登録、編集されました。
			</div>

			<div class="btn-area">
				<a href="home.html" class="btn">ホームへ戻る</a>
			</div>

		</div>

	</main>

</body>

</html>

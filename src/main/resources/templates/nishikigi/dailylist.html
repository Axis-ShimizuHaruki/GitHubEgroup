<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報一覧</title>
  <link rel="stylesheet" th:href="@{/css/dailyreport.css}">

  <style></style>
</head>

<body>
  <header class="system-header">

    <div class="header-top">

      <div class="logo-area">
        <a th:if="${session.loginUser.roll == 0}" th:href="@{/homeoffice}">
          <img th:src="@{/images/icon.png}" alt="ロゴ" class="logo-img">
        </a>
        <a th:unless="${session.loginUser.roll == 0}" th:href="@{/homesite}">
          <img th:src="@{/images/icon.png}" alt="ロゴ" class="logo-img">
        </a>
        <div class="site-system-name">
          日報一覧
        </div>
      </div>

      <div class="user-area">
        <div th:if="${session.loginUser != null}" class="user-info-box">
          <span class="user-name-text"><strong th:text="${session.loginUser.username}">田中 太郎</strong> さん</span>
          <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="logout-btn">ログアウト</button>
          </form>
        </div>

        <div th:unless="${session.loginUser != null}">
          <a th:href="@{/login}" class="logout-btn" style="text-decoration: none; display: inline-block; text-align: center;">ログイン</a>
        </div>
      </div>

    </div>
	
	<div class="page-title-bar" style="display: flex; align-items: center; justify-content: flex-start; gap: 40px; padding: 0 20px;">
	    <div class="header-site-name" style="font-weight: bold; font-size: 15px; color: #1f3c88;">
	        <span th:if="${session.loginUser.roll != 0}">
	            <span th:each="s : ${siteList}" th:if="${s.siteId == session.siteId}" th:text="${s.siteName}">担当現場名</span>
	        </span>
	        <span th:if="${session.loginUser.roll == 0}">
	            <span th:if="${headerSiteId != null && headerSiteId != ''}">
	                <span th:each="s : ${siteList}" th:if="${#strings.equals(s.siteId, headerSiteId)}" th:text="${s.siteName} + '（絞り込み中）'">ポータル現場名</span>
	            </span>
	            <span th:if="${headerSiteId == null || headerSiteId == ''}">全現場対象エリア</span>
	        </span>
	    </div>

		<a th:if="${session.loginUser.roll == 0 && session.fromPortalSiteId != null}" 
		   th:href="@{/portal/{id}(id=${session.fromPortalSiteId})}" 
		   class="nav-link" 
		   style="color: #1f3c88 !important; font-size: 15px; font-weight: normal !important;">
		   ◀ 現場ポータルへ戻る
		</a>
<!--	    <a th:href="@{/dailyreport/list}" class="nav-link active">日報一覧</a>-->
	</div>
	
  </header>

  <div class="container">

    <form th:action="@{/dailyreport/list}" method="get" class="search-area">
		<input type="hidden" name="search" value="true">

      <div class="search-item">
        <label class="search-label">日付</label>
        <input type="date" name="targetDate" class="search-input" th:value="${param.targetDate}">
      </div>

      <div class="search-item" th:if="${session.loginUser.roll == 0}">
        <label class="search-label">現場名</label>
		<select name="siteId" class="search-select">
		  <option value="" th:selected="${currentSiteId == null}">すべて</option>
		  <option th:each="site : ${siteList}" 
		          th:if="${site.siteId != 1}"
		          th:value="${site.siteId}" 
		          th:text="${site.siteName}"
		          th:selected="${site.siteId == currentSiteId}"> </option>
		</select>
      </div>
	  
	  <div class="search-item">
	          <label class="search-label">作業内容キーワード</label>
	          <input type="text" name="workDetails" class="search-input" th:value="${workDetails}" maxlength="50" placeholder="例：コンクリート">
	  </div>

      <div class="search-item">
        <label class="search-label">本社対応</label>
        <select name="dStatusFlag" class="search-select">
          <option value="">すべて</option>
          <option value="0" th:selected="${#strings.equals(param.dStatusFlag, '0')}">未確認</option>
          <option value="1" th:selected="${#strings.equals(param.dStatusFlag, '1')}">確認済み</option>
        </select>
      </div>

	  <div class="search-btn-area">
	    <button type="submit" class="search-btn">検索</button>
	    <button type="button" th:onclick="|location.href='@{/dailyreport/list(clear=true)}'|" class="search-btn btn-reset-gray">リセット</button>
	  </div>

    </form>

	<div class="table-container">
    <table class="report-table">
      <thead>
        <tr>
          <th>日付</th>
          <th th:if="${session.loginUser.roll == 0}">現場名</th>
          <th>当日作業内容</th>
          <th>本社対応</th>
          <th>詳細</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="report : ${reportList}">
          <td th:text="${#temporals.format(report.targetDate, 'yyyy/MM/dd')}">2026/05/26</td>
          
          <td th:if="${session.loginUser.roll == 0}" th:text="${report.site.siteName}">新宿ビル建設工事</td>
          
          <td th:text="${#strings.abbreviate(report.workDetails, 25)}">鉄筋・型枠工事、コンクリート打設...</td>
          
          <td>
            <span th:class="${report.dStatusFlag == 0 ? 'status-badge status-progress' : 'status-badge status-complete'}"
                  th:text="${report.dStatusFlag == 0 ? '未確認' : '確認済み'}">
              未確認
            </span>
          </td>
		  <td>
		    <a th:href="@{/dailyreport/{id}(id=${report.reportId}, 
		       from='list', 
		       targetDate=${currentTargetDate}, 
		       siteId=${currentSiteId}, 
		       workDetails=${currentWorkDetails}, 
		       dStatusFlag=${currentDStatusFlag}
		    )}" class="detail-btn">詳細</a>
		  </td>
        </tr>
        
        <tr th:if="${#lists.isEmpty(reportList)}">
          <td th:colspan="${session.loginUser.roll == 0 ? 5 : 4}" style="text-align: center; color: #718096;">
            該当する日報データが見つかりません。
          </td>
        </tr>
      </tbody>
    </table>
	</div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報登録</title>
  <link rel="stylesheet" th:href="@{/css/dailyreport.css}">

  
  <style></style>
</head>

<body>

	<header class="system-header">

			    <div class="header-top">

					<div class="logo-area">
					        
					        <a th:if="${session.loginUser.roll == 0}" th:href="@{/homeoffice}">
					          <img th:src="@{/images/icon.png}" alt="ロゴ" class="logo-img">
					        </a>
					        
					        <a th:unless="${session.loginUser.roll == 0}" th:href="@{/homesite}">
					          <img th:src="@{/images/icon.png}" alt="ロゴ" class="logo-img">
					        </a>
					        
					        <div class="site-system-name">
					          日報登録
					        </div>
					        
					      </div>

			      <div class="user-area">
			        <div th:if="${session.loginUser != null}" class="user-info-box">
			          <span class="user-name-text"><strong th:text="${session.loginUser.username}">田中 太郎</strong> さん</span>
			          <form th:action="@{/logout}" method="post" style="display: inline;">
			            <button type="submit" class="logout-btn">ログアウト</button>
			          </form>
			        </div>

			        <div th:unless="${session.loginUser != null}">
			          <a th:href="@{/login}" class="logout-btn" style="text-decoration: none; display: inline-block; text-align: center;">ログイン</a>
			        </div>
			      </div>

			    </div>

			    <div class="page-title-bar">
			      <a th:href="@{/dailyreport/list}" class="nav-link active">日報一覧</a>
			    </div>

			  </header>

  <div class="container">

    <form th:action="@{/dailyreport/new/confirm}" th:object="${dailyreport}" method="post" id="reportForm">

      <div class="section">
        <div class="section-title">作業実績</div>

		<div class="grid-2">
		          <div>
		            <label>現場名</label>
		            <input type="hidden" th:field="*{site.siteId}" />
		            <select disabled style="background-color: #e2e8f0; cursor: not-allowed;">
		              <option th:each="site : ${siteList}" 
		                      th:value="${site.siteId}" 
		                      th:text="${site.siteName}"
		                      th:selected="${site.siteId == dailyreport.site?.siteId}">
		              </option>
		            </select>
		          </div>

		          <div>
		            <label for="projectNumber">工事番号</label>
		            <input type="text" id="projectNumber" th:field="*{projectNumber}" required maxlength="10">
		          </div>

		          <div>
		            <label for="targetDate">日付</label>
		            <input type="date" id="targetDate" name="targetDate" 
		                   th:value="${#temporals.format(dailyreport.targetDate, 'yyyy-MM-dd')}" required>
		          </div>

          <div>
            <label for="weather">天候</label>
            <select id="weather" th:field="*{weather}" required>
              <option value="">-- 選択してください --</option>
              <option value="1">晴れ</option>
              <option value="2">曇り</option>
              <option value="3">雨</option>
              <option value="4">雪</option>
            </select>
          </div>

          <div>
            <label for="temperature">気温 (℃)</label>
            <input type="number" id="temperature" th:field="*{temperature}" placeholder="例：25" required>
          </div>
        </div>

        <label for="workDetails">当日作業内容（工種別）</label>
        <textarea id="workDetails" th:field="*{workDetails}" placeholder="鉄筋・型枠・コンクリ打設・設備などの作業内容" required maxlength="500"></textarea>
      </div>

      <div class="section">
        <div class="section-title">出面（協力会社別）</div>
        <input type="hidden" th:field="*{workerDetails}" id="workerDetails">

        <div class="sub-box" id="worker-rows">
          <div class="worker-row">
            <label>会社名</label>
            <input type="text" class="input-company" placeholder="例：錦木組">
            <label>職人数</label>
            <input type="number" class="input-count" placeholder="例：3">
            <label>氏名</label>
            <input type="text" class="input-names" placeholder="例：山田、佐藤">
          </div>
        </div>
        <button type="button" class="btn" onclick="addWorkerRow()">＋ 追加</button>
      </div>

      <div class="section">
        <div class="section-title">工程進捗</div>
        <label for="progressPercent">全体進捗（%）</label>
        <input type="range" id="progressPercent" th:field="*{progressPercent}" min="0" max="100" oninput="document.getElementById('rangeVal').innerText = this.value + '%'">
        <span id="rangeVal">50%</span>
      </div>

      <div class="section">
        <div class="section-title">写真記録（ファイル名を入力）</div>
        <div class="check-item">
          <label for="photoBefore">写真_着工前</label>
          <input type="text" id="photoBefore" th:field="*{photoBefore}" placeholder="例：before.jpg">
        </div>
        <div class="check-item">
          <label for="photoDuring">写真_施工中</label>
          <input type="text" id="photoDuring" th:field="*{photoDuring}" placeholder="例：during.jpg">
        </div>
        <div class="check-item">
          <label for="photoAfter">写真_完了</label>
          <input type="text" id="photoAfter" th:field="*{photoAfter}" placeholder="例：after.jpg">
        </div>
        <div class="check-item">
          <label for="photoInspection">配筋検査写真（必須）</label>
          <input type="text" id="photoInspection" th:field="*{photoInspection}" placeholder="例：inspection.jpg" required>
        </div>
        <div class="check-item">
          <label for="photoSafety">安全帯使用状況写真（必須）</label>
          <input type="text" id="photoSafety" th:field="*{photoSafety}" placeholder="例：safety.jpg" required>
        </div>
      </div>

	  <div class="section">
	          <div class="section-title">安全管理</div>
	          
	          <label for="safetyKy">KY項目</label>
	          <textarea id="safetyKy" th:field="*{safetyKy}" required maxlength="500"
	                    placeholder="例：高所作業時における外部足場からの墜落・転落の危険、開口部まわりでの踏み外しの危険"></textarea>

	          <label for="safetyMeasure">対策</label>
	          <textarea id="safetyMeasure" th:field="*{safetyMeasure}" required maxlength="500"
	                    placeholder="例：フルハーネス型安全帯の完全着用の徹底、親綱の緊張状態の確認、開口部手摺りの再点検実施"></textarea>

	          <label for="safetyEducation">新規入場者教育</label>
	          <textarea id="safetyEducation" th:field="*{safetyEducation}" required maxlength="500"
	                    placeholder="例：株式会社A工業の新規入場者3名に対し、当現場の独自ルール、災害防止協議会事項、避難経路の教育を実施。全員理解度良好。"></textarea>

	          <label for="nearMiss">ヒヤリハット</label>
	          <textarea id="nearMiss" th:field="*{nearMiss}" required maxlength="500"
	                    placeholder="例：2階通路の段差に足元を取られ、つまずきそうになった。（対策：該当箇所に注意喚起のクッション材とカラーコーンを設置）。特になければ「特になし」と入力"></textarea>
	        </div>

	        <div class="section">
	          <div class="section-title">資材・機材</div>
	          
	          <label for="materials">搬入物</label>
	          <textarea id="materials" th:field="*{materials}" required maxlength="500"
	                    placeholder="例：生コンクリート（21-18-20BB） 12.5m3、構造用異形鉄筋（D19・D22） 計4.5t 搬入完了"></textarea>

	          <label for="equipments">レンタル機材稼働</label>
	          <textarea id="equipments" th:field="*{equipments}" required maxlength="500"
	                    placeholder="例：25tラフタークレーン（錦木リース） 1台終日稼働、高所作業車（12m型） 2台使用、不具合なし"></textarea>
	        </div>

      <div class="section">
        <div class="section-title">問題・調整事項</div>
        <label for="designChange">設計変更指示</label>
        <textarea id="designChange" th:field="*{designChange}" placeholder="設計変更指示の内容" required maxlength="500"></textarea>

        <label for="customerRequest">客先追加要望</label>
        <textarea id="customerRequest" th:field="*{customerRequest}" placeholder="客先追加要望の内容" required maxlength="500"></textarea>

        <label for="partnerCoordination">協力会社調整</label>
        <textarea id="partnerCoordination" th:field="*{partnerCoordination}" placeholder="協力会社調整の内容" required maxlength="500"></textarea>

        <label for="nextDaySchedule">翌日予定</label>
        <textarea id="nextDaySchedule" th:field="*{nextDaySchedule}" placeholder="翌日の作業予定" required maxlength="500"></textarea>
      </div>

      <div class="section">
        <div class="section-title">コメント</div>
        <textarea id="notes" th:field="*{notes}" placeholder="一日の総括（任意のコメント）" maxlength="500"></textarea>
      </div>

      <div class="btn-area">
        <a th:href="@{/homesite}" class="btn btn-gray">戻る</a>
        <button type="submit" class="btn">確認</button>
      </div>

    </form>
  </div>

  <script>
    // ★ 修正ポイント：出面（協力会社）の入力欄を動的に追加する関数
    function addWorkerRow() {
      const container = document.getElementById('worker-rows');
      
      // 新しい入力行のラッパーを作成
      const newRow = document.createElement('div');
      newRow.className = 'worker-row';
      newRow.style.borderTop = '1px dashed #cbd5e0';
      newRow.style.paddingTop = '15px';
      newRow.style.marginTop = '15px';
      
      // 行の中身（HTML構造）を注入
      newRow.innerHTML = `
        <label>会社名</label>
        <input type="text" class="input-company" placeholder="例：錦木組">
        <label>職人数</label>
        <input type="number" class="input-count" placeholder="例：3">
        <label>氏名</label>
        <input type="text" class="input-names" placeholder="例：山田、佐藤">
      `;
      
      container.appendChild(newRow);
    }

	
    // 全ての入力行を集計して1つのJSON文字列にまとめる関数
    function serializeWorkerDetails() {
      const rows = document.querySelectorAll('.worker-row');
      const workerList = [];
      
      rows.forEach(row => {
        const company = row.querySelector('.input-company').value;
        const count = row.querySelector('.input-count').value;
        const names = row.querySelector('.input-names').value;
        
        // どこか1つでも入力されていたら集計対象にする
        if (company || count || names) {
          workerList.push({
            company: company,
            count: count,
            names: names
          });
        }
      });
      document.getElementById('workerDetails').value = JSON.stringify(workerList);
    }

    // フォーム送信時に自動でJSON化を実行
    document.getElementById('reportForm').addEventListener('submit', function(e) {
      serializeWorkerDetails();
    });
  </script>

</body>
</html>

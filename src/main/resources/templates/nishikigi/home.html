<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>業務管理システム</title>

  <style>

  </style>
</head>

<body>

  <!-- =========================
       ヘッダー
  ========================= -->

  <header>

     <!-- 上段 -->
     <div class="header-top">

       <!-- 左：ロゴ -->
       <div class="logo-area">

         <a href="home.html">

           <img src="icon.png" alt="ロゴ" class="logo-img">

         </a>

       </div>

       <!-- 右：ユーザー -->
       <div class="user-area">

  	<div>
  		<!-- ログイン中の場合 -->
  		<span th:if="${session.loginUser != null}">
  			<span th:text="${session.loginUser.username}">ゲスト</span>さん
  				<form th:action="@{/logout}" method="post" class="logout-form">
  					<button type="submit">ログアウト</button>
  				</form>
  			</span>
  		<!-- 未ログインの場合 -->
  			<span th:unless="${session.loginUser != null}">
  				<a th:href="@{/login}">ログイン</a>
  			</span>
  	</div>
       </div>

     </div>

     <!-- 下段 -->
    
	 
	 <div class="page-title-bar">
	   <p th:text="${site.siteName}"></p>
	 </div>

   </header>

  <!-- メイン -->
  <main>

    <!-- 左メニュー -->
    <div class="button-area">

      <!-- 日報 -->
      <div class="menu-group">
        <a th:href="@{/dailyreport/new}" class="menu-button">
          日報作成
        </a>

        <a th:href="@{/dailyreport/list}" class="sub-button">
          日報一覧
        </a>
      </div>

      <!-- 安全点検 -->
      <div class="menu-group">
        <a th:href="@{/safetyinspection/new}" class="menu-button">
          安全点検作成
        </a>

        <a th:href="@{/safetyinspection/list}" class="sub-button">
          安全点検一覧
        </a>
      </div>

      <!-- トラブル -->
      <div class="menu-group">
        <a th:href="@{/trouble/new}" class="menu-button">
          トラブル報告作成
        </a>

        <a th:href="@{/trouble/list}" class="sub-button">
          トラブル一覧
        </a>
      </div>

    </div>

    <!-- チャット -->
    <div class="chat-panel">

      <div class="chat-header">
        現場チャット
      </div>

      <div class="chat-messages">

        <div class="message-row other">
          <div class="message">
            本日の安全点検は15時までに提出してください。
          </div>
        </div>

        <div class="message-row me">
          <div class="message">
            了解しました。確認後提出します。
          </div>
        </div>

        <div class="message-row other">
          <div class="message">
            本日午後から資材搬入があります。
          </div>
        </div>

        <div class="message-row me">
          <div class="message">
            作業員へ共有済みです。
          </div>
        </div>

      </div>

      <!-- 入力欄 -->
      <div class="chat-input">
        <input type="text" placeholder="メッセージを入力">
        <button>送信</button>
      </div>

    </div>

  </main>

  <!-- 左下ステータス -->
  <div class="status-bubble">

    <div class="status-item">
      <span class="status-title">日報</span>
      <span class="done">✔ 作成済み</span>
    </div>

    <div class="status-item">
      <span class="status-title">安全点検</span>
      <span class="not-done blinking">⚠ 未作成</span>
    </div>

  </div>

</body>

</html>

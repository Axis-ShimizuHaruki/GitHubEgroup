<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>現場一覧</title>
	<link rel="stylesheet" href="css/list.css" />
</head>

<body>

	<!-- ===== ヘッダー ===== -->
	<header>

		<!-- 上段 -->
		<div class="header-top">

			<!-- 左：ロゴ -->
			<div class="logo-area">

				<a th:href="@{/homeoffice}">
					<img src="icon.png" alt="ロゴ" class="logo-img">
				</a>

			</div>

			<!-- 右：ユーザー -->
			<div class="user-area">

				<div>
					<!-- ログイン中の場合 -->
					<span th:if="${session.loginUser != null}">
						<span th:text="${session.loginUser.username}">ゲスト</span>さん
						<form th:action="@{/logout}" method="post" class="logout-form">
							<button type="submit">ログアウト</button>
						</form>
					</span>
					<!-- 未ログインの場合 -->
					<span th:unless="${session.loginUser != null}">
						<a th:href="@{/login}">ログイン</a>
					</span>
				</div>
			</div>

		</div>

		<!-- 下段 -->
		<div class="page-title-bar">

			<a th:href="@{/dailyreport/list}">
				日報一覧
			</a>

			<a th:href="@{/safetyinspection/list}">
				安全点検一覧
			</a>

			<a th:href="@{/trouble/list}">
				トラブル一覧
			</a>

		</div>

	</header>

	<h1 style="margin-bottom: 24px;">現場一覧</h1>

	<!-- 優先度高 -->
	<div class="section">

		<div class="section-title high">
			優先度高
		</div>

		<div class="site-list">

			<div th:each="view : ${siteViews}">

				<div class="site-card high" th:if="${view.maxPriority == 3}">

					<a th:href="@{/portal/{id}(id=${view.site.siteId})}">
						<span th:text="${view.site.siteName}"></span>
					</a>

					<div class="status">


						<div class="status-item">

							<a th:href="@{/dailyreport/{id}(id=${view.site.siteId})}">
								日報確認
							</a>

							<span th:if="${view.dailyStatus == '確認済'}" class="checked">
								✔ 確認済
							</span>

							<span th:if="${view.dailyStatus == '未確認'}" class="unchecked">
								▲ 未確認
							</span>

							<span th:if="${view.dailyStatus == '未提出'}" class="unchecked">
								✖ 未提出
							</span>


							<a th:href="@{/safetyinspection/{id}(id=${view.site.siteId})}">
								安全点検確認
							</a>
							<span th:if="${view.safetyStatus == '確認済'}" class="checked">
								✔ 確認済
							</span>

							<span th:if="${view.safetyStatus == '未確認'}" class="unchecked">
								▲ 未確認
							</span>

							<span th:if="${view.safetyStatus == '未提出'}" class="unchecked">
								✖ 未提出
							</span>

						</div>


					</div>

					<div class="trouble-box">
						<div th:each="trouble : ${view.site.troubleList}">
							<a th:href="@{/trouble/{id}(id=${trouble.troubleId})}">
								<span th:text="${trouble.overview}"></span>
							</a>
						</div>
					</div>
				</div>

			</div>
		</div>
	</div>


	<!-- 優先度中 -->
	<div class="section">

		<div class="section-title medium">
			優先度中
		</div>

		<div class="site-list">
			<div th:each="view : ${siteViews}">

				<div class="site-card high" th:if="${view.maxPriority == 2}">

					<a th:href="@{/portal/{id}(id=${view.site.siteId})}">
						<span th:text="${view.site.siteName}"></span>
					</a>

					<div class="status">


						<div class="status-item">

							<a th:href="@{/dailyreport/{id}(id=${view.site.siteId})}">
								日報確認
							</a>

							<span th:if="${view.dailyStatus == '確認済'}" class="checked">
								✔ 確認済
							</span>

							<span th:if="${view.dailyStatus == '未確認'}" class="unchecked">
								▲ 未確認
							</span>

							<span th:if="${view.dailyStatus == '未提出'}" class="unchecked">
								✖ 未提出
							</span>

							<a th:href="@{/safetyinspection/{id}(id=${view.site.siteId})}">
								安全点検確認
							</a>
							<span th:if="${view.safetyStatus == '確認済'}" class="checked">
								✔ 確認済
							</span>

							<span th:if="${view.safetyStatus == '未確認'}" class="unchecked">
								▲ 未確認
							</span>

							<span th:if="${view.safetyStatus == '未提出'}" class="unchecked">
								✖ 未提出
							</span>
						</div>

					</div>

					<div class="trouble-box">
						<div th:each="trouble : ${view.site.troubleList}">
							<a th:href="@{/trouble/{id}(id=${trouble.troubleId})}">
								<span th:text="${trouble.overview}"></span>
							</a>
						</div>
					</div>
				</div>

			</div>
		</div>
	</div>


	<!-- 優先度低 -->
	<div class="section">

		<div class="section-title low">
			優先度低
		</div>
		<div class="site-list">

			<div th:each="view : ${siteViews}">

				<div class="site-card high" th:if="${view.maxPriority == 1}">

					<a th:href="@{/portal/{id}(id=${view.site.siteId})}">
						<span th:text="${view.site.siteName}"></span>
					</a>

					<div class="status">


						<div class="status-item">

							<a th:href="@{/dailyreport/{id}(id=${view.site.siteId})}">
								日報確認
							</a>

							<span th:if="${view.dailyStatus == '確認済'}" class="checked">
								✔ 確認済
							</span>

							<span th:if="${view.dailyStatus == '未確認'}" class="unchecked">
								▲ 未確認
							</span>

							<span th:if="${view.dailyStatus == '未提出'}" class="unchecked">
								✖ 未提出
							</span>

							<a th:href="@{/safetyinspection/{id}(id=${view.site.siteId})}">
								安全点検確認
							</a>
							<span th:if="${view.safetyStatus == '確認済'}" class="checked">
								✔ 確認済
							</span>

							<span th:if="${view.safetyStatus == '未確認'}" class="unchecked">
								▲ 未確認
							</span>

							<span th:if="${view.safetyStatus == '未提出'}" class="unchecked">
								✖ 未提出
							</span>
						</div>
					</div>

					<div class="trouble-box">
						<div th:each="trouble : ${view.site.troubleList}">
							<a th:href="@{/trouble/{id}(id=${trouble.troubleId})}">
								<span th:text="${trouble.overview}"></span>
							</a>
						</div>
					</div>
				</div>
			</div>

		</div>

	</div>
	</div>

	<!-- トラブルなし -->
	<div class="section">

		<div class="section-title none">
			トラブルなし
		</div>

		<div class="site-list">

			<div th:each="view : ${siteViews}">

				<div class="site-card none" th:if="${view.maxPriority == 0}">

					<a th:href="@{/portal/{id}(id=${view.site.siteId})}">
						<span th:text="${view.site.siteName}"></span>
					</a>
					<div class="status">

						<div class="status-item">


							<a th:href="@{/dailyreport/{id}(id=${view.site.siteId})}">
								日報確認
							</a>

							<span th:if="${view.dailyStatus == '確認済'}" class="checked">
								✔ 確認済
							</span>

							<span th:if="${view.dailyStatus == '未確認'}" class="unchecked">
								▲ 未確認
							</span>

							<span th:if="${view.dailyStatus == '未提出'}" class="unchecked">
								✖ 未提出
							</span>

							<a th:href="@{/safetyinspection/{id}(id=${view.site.siteId})}">
								安全点検確認
							</a>
							<span th:if="${view.safetyStatus == '確認済'}" class="checked">
								✔ 確認済
							</span>

							<span th:if="${view.safetyStatus == '未確認'}" class="unchecked">
								▲ 未確認
							</span>

							<span th:if="${view.safetyStatus == '未提出'}" class="unchecked">
								✖ 未提出
							</span>
						</div>

					</div>
				</div>

			</div>
		</div>
	</div>

</body>

</html>

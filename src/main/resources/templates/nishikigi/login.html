<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ログイン画面</title>

	<link rel="stylesheet" href="css/style.css" />
</head>

<body>

	<div class="login-box">
		<h2>ログイン</h2>
		<form action="login" method="post">
			<div class="input-group">
				<label for="userid">ID</label>
				<input type="number" id="userid" name="userid" placeholder="IDを入力" required pattern="[0-9]+"
					title="半角数字のみ入力してください">
			</div>

			<div class="input-group">
				<label for="password">パスワード</label>
				<input type="password" id="password" name="password" placeholder="パスワードを入力" required minlength="8"
					maxlength="15" pattern="[A-Za-z0-9]+" title="8〜15文字の半角英数字のみ入力してください">
			</div>

			<button type="submit" class="login-btn">
				ログイン
			</button>
		</form>
	</div>

	<div th:if="${loginError}">
		<script>
			alert("IDまたはパスワードが違います");
		</script>
	</div>

</body>

</html>

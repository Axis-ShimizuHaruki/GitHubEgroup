<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン | Sample Corporation</title>
    <link rel="stylesheet" href="css/login.css" />
</head>

<body>

    <div class="login-container">
        <div class="login-box">

            <!-- ロゴ部分だけ差し替え -->

            <div class="logo-area">

                <!-- ロゴ画像 -->
                <img th:src="@{/images/icon.png}" alt="会社ロゴ" class="company-logo">


                <div class="system-name">
                    システム ログイン
                </div>
            </div>

            <!-- ログインフォーム -->
            <form action="login" method="post">

                <div class="input-group">
                    <label for="userid">ID</label>
                    <input type="number" id="userid" name="userid" placeholder="IDを入力" required pattern="[0-9]+"
                        title="半角数字のみ入力してください">
                </div>

                <div class="input-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" name="password" placeholder="パスワードを入力" required minlength="8"
                        maxlength="15" pattern="[A-Za-z0-9]+" title="8〜15文字の半角英数字のみ入力してください">
                </div>

                <button type="submit" class="login-btn">
                    ログイン
                </button>

            </form>

            <div class="footer-text">
                © 2026 NISHIKIGI CORPORATION
            </div>

        </div>
    </div>

    <div th:if="${loginError}">
        <script>
            alert("IDまたはパスワードが違います");
        </script>
    </div>

</body>

</html>

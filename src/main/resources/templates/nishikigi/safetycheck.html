<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全点検登録</title>

  <style>

  </style>
</head>

<body>

  <!-- =========================
       ヘッダー
  ========================= -->

  <header>

    <!-- 上段 -->
    <div class="header-top">

      <!-- 左 -->
      <div class="logo-area">

        <a href="home.html">

          <img src="icon.png" alt="ロゴ" class="logo-img">

        </a>

      </div>

      <!-- 右 -->
      <div class="user-area">

        <div>
          ログインユーザ：田中 太郎
        </div>

        <a href="logout.html" class="logout-btn">
          ログアウト
        </a>

      </div>

    </div>

    <!-- 下段 -->
    <div class="page-title-bar">
      安全点検登録
    </div>

  </header>

  <!-- =========================
       メイン
  ========================= -->

  <div class="container">

    <!-- 点検項目 -->
    <div class="section">

      <div class="section-title">
        点検項目
      </div>

      <div class="check-item">
        <label>足場（手すり・幅木・滑り止め）</label>

        <select>
          <option>良好</option>
          <option>不備</option>
        </select>
      </div>

      <div class="check-item">
        <label>開口部養生</label>

        <select>
          <option>良好</option>
          <option>不備</option>
        </select>
      </div>

      <div class="check-item">
        <label>高所作業の安全帯使用</label>

        <select>
          <option>良好</option>
          <option>不備</option>
        </select>
      </div>

      <div class="check-item">
        <label>重機点検記録</label>

        <select>
          <option>良好</option>
          <option>不備</option>
        </select>
      </div>

      <div class="check-item">
        <label>火気使用時の消火器配置</label>

        <select>
          <option>良好</option>
          <option>不備</option>
        </select>
      </div>

      <div class="check-item">
        <label>整理整頓（つまずきリスク）</label>

        <select>
          <option>良好</option>
          <option>不備</option>
        </select>
      </div>

      <div class="check-item">
        <label>仮設電気の絶縁</label>

        <select>
          <option>良好</option>
          <option>不備</option>
        </select>
      </div>

      <!-- 画像アップロード -->
      <!-- <div class="check-item">
        <label for="photo-upload">点検写真アップロード</label>

        <input type="file" id="photo-upload" accept="image/*">
      </div> -->

    </div>

    <!-- 登録 -->
    <div class="btn-area">

      <button class="btn" onclick="location.href='safetycheckcheck.html'">
        登録
      </button>

    </div>

  </div>

</body>

</html>

<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全点検一覧</title>

  <style>

  </style>
</head>

<body>

  <!-- =========================
       ヘッダー
  ========================= -->

  <header>

    <!-- 上段 -->
    <div class="header-top">

      <!-- 左 -->
      <div class="logo-area">

        <a href="list.html">

          <img src="icon.png" alt="ロゴ" class="logo-img">

        </a>

      </div>

      <!-- 右 -->
      <div class="user-area">

        <span class="user-name">
          ログインユーザ：田中 太郎
        </span>

        <button class="logout-btn">
          ログアウト
        </button>

      </div>

    </div>

    <!-- 下段 -->
    <div class="page-title-bar">
      安全点検一覧
    </div>

  </header>

  <!-- =========================
       メイン
  ========================= -->

  <main>

	<form th:action="@{/safetyinspection/search}" method="get">

	    <div class="search-box">

	        <div class="search-title">
	            検索条件
	        </div>

	        <div class="search-grid">

	            <!-- 登録日 -->
	            <div class="search-item">
	                <label>登録日</label>
					<input type="date"
					       name="sCreatedAt"
					       th:value="${sCreatedAt}">
	            </div>

				<div class="search-item">
				    <label>現場名</label>

				    <select name="siteId">
				        <option value="">すべて</option>

						<option th:each="site : ${siteList}"
						        th:value="${site.siteId}"
						        th:text="${site.siteName}"
						        th:selected="${site.siteId == siteId}">
						</option>
				    </select>
				</div>
				
	            <!-- 判定 -->
	            <div class="search-item">
	                <label>判定</label>
	                <select name="judgement">
						<option value=""
						        th:selected="${judgement == null or judgement == ''}">
						    すべて
						</option>

						<option value="良好"
						        th:selected="${judgement == '良好'}">
						    良好
						</option>

						<option value="要対応"
						        th:selected="${judgement == '要対応'}">
						    要対応
						</option>
	                </select>
	            </div>

	            <!-- ボタン -->
	            <button type="submit" class="search-btn">
	                検索
	            </button>

				<button type="button"
				        class="reset-btn"
				        th:onclick="|location.href='@{/safetyinspection/list}'|">
				    リセット
				</button>
	        </div>

	    </div>

	</form>
    <!-- テーブル -->
    <div class="table-wrap">

      <table class="check-table">

        <thead>
          <tr>
            <th>登録日</th>
            <th>現場名</th>
            <th>点検項目数</th>
            <th>良好</th>
            <th>不備</th>
            <th>判定</th>
			<th>確認ステータス</th>
            <th>詳細</th>
          </tr>
        </thead>

		<tbody>

		    <tr th:each="safety : ${safetyList}">

		        <!-- 登録日 -->
		        <td th:text="${#temporals.format(safety.sCreatedAt, 'yyyy/MM/dd')}">
		            2026/05/26
		        </td>

		        <!-- 現場名 -->
		        <td th:text="${safety.site.siteName}">
		        </td>

		        <!-- 点検項目数 -->
		        <td>7件</td>

		        <!-- 良好 -->
		        <td class="status-ok">
		            <span th:text="${safety.goodCount} + '件'"></span>
		        </td>

		        <!-- 不備 -->
		        <td class="status-ng">
		            <span th:text="${safety.badCount} + '件'"></span>
		        </td>

		        <!-- 判定 -->
		        <td>
		            <span
		                  th:text="${safety.judgement}">
		                良好
		            </span>
		        </td>

				<!-- 確認ステータス -->
				<td>
				    <span th:text="${safety.sStatusFlag == 0 ? '提出済み' : '確認済み'}">
				    </span>
				</td>
				
		        <!-- 詳細 -->
		        <td>
		            <a th:href="@{/safetyinspection/{id}(id=${safety.safetyId})}"
		               class="detail-btn">
		                詳細
		            </a>
		        </td>

		    </tr>

		</tbody>
      </table>

    </div>

  </main>

  <!-- 左下ステータス吹き出し -->
  <div class="status-bubble">

    <div class="status-item">
      <span class="status-title">日報</span>
      <span class="done">✔ 作成済み</span>
    </div>

    <div class="status-item">
      <span class="status-title">安全点検</span>
      <span class="not-done blinking">⚠ 未作成</span>
    </div>

  </div>

</body>

</html>

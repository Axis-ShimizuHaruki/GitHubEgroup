<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>トラブル登録画面</title>
	<link rel="stylesheet" th:href="@{/css/trouble/trouble.css}" />

</head>

<body>

	<!-- =========================
       ヘッダー
  ========================= -->

	<header>

		<!-- 上段 -->
		<div class="header-top">

			<!-- 左 -->
			<div class="logo-area">

				<a th:href="@{/homesite}">
					<img th:src="@{/images/icon.png}" alt="ロゴ" class="logo-img">
				</a>

			</div>

			<!-- 右 -->
			<div class="user-area">

				<!-- ログイン中 -->
				<div th:if="${session.loginUser != null}">
					<span th:text="${session.loginUser.username}">
						ゲスト
					</span> さん
				</div>

				<form th:if="${session.loginUser != null}" th:action="@{/logout}" method="post">

					<button type="submit" class="logout-btn">
						ログアウト
					</button>

				</form>

				<!-- 未ログイン -->
				<div th:unless="${session.loginUser != null}">
					<a th:href="@{/login}" class="logout-btn">
						ログイン
					</a>
				</div>

			</div>

		</div>

		<!-- 下段 -->
		<div class="page-title-bar">
			トラブル登録
		</div>

	</header>

	<!-- =========================
       メイン
  ========================= -->

	<div class="container">

		<h1>トラブル登録</h1>

		<form th:action="@{/trouble/new/confirm}" method="post">

			<!-- 緊急度 -->
			<div class="form-group">
				<label for="priority">緊急度</label>

				<select id="priority" name="priority">
					<option value="">選択してください</option>
					<option value="3">高</option>
					<option value="2">中</option>
					<option value="1">低</option>
				</select>
			</div>

			<!-- トラブル種別 -->
			<div class="form-group">
				<label for="type">トラブル種別</label>

				<select id="type" name="troubleType">
					<option value="">選択してください</option>
					<option value="1">事故</option>
					<option value="2">資材不足</option>
					<option value="3">納品遅れ</option>
					<option value="4">工程遅延</option>
					<option value="5">その他</option>
				</select>
			</div>

			<!-- 一言 -->
			<div class="form-group">
				<label for="summary">一言で表す</label>

				<input type="text" id="summary" name="overview" maxlength="100" placeholder="例：サーバに接続できない" />
			</div>

			<!-- 詳細 -->
			<div class="form-group">
				<label for="detail">具体的な内容</label>

				<textarea id="detail" name="detail" maxlength="500" placeholder="発生状況やエラー内容を詳しく入力してください"></textarea>
			</div>

			<!-- ボタン -->
			<button type="submit" class="submit-btn">
				登録
			</button>

		</form>

	</div>

</body>

</html>

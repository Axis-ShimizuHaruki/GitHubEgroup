<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トラブル登録確認</title>

  <style>

  </style>
</head>

<body>

  <!-- =========================
       ヘッダー
  ========================= -->

  <header>

    <!-- 上段 -->
    <div class="header-top">

      <!-- 左 -->
      <div class="logo-area">

        <a href="portal.html">

          <img src="icon.png" alt="ロゴ" class="logo-img">

        </a>

      </div>

      <!-- 右 -->
      <div class="user-area">

        <span class="user-name">
          ログインユーザ：山田 太郎
        </span>

        <button class="logout-btn">
          ログアウト
        </button>

      </div>

    </div>

    <!-- 下段 -->
    <div class="page-title-bar">
      トラブル登録確認
    </div>

  </header>

  <!-- =========================
       メイン
  ========================= -->

  <div class="container">

    <!-- サマリー -->
    <div class="section">

      <div class="section-title">
        入力内容確認
      </div>

      <div class="summary-box">
        <div class="summary-title">
          確認内容
        </div>

        登録内容を確認してください。<br>
        問題がなければ「確認」を押してください。

      </div>

    </div>

    <!-- 基本情報 -->
    <div class="section">

      <div class="section-title">
        トラブル情報
      </div>

      <div class="item">

        <div class="label">
          緊急度
        </div>

        <div class="value">
          <span class="badge high">高</span>
        </div>

      </div>

      <div class="item">

        <div class="label">
          トラブル種別
        </div>

        <div class="value">
          納品遅れ
        </div>

      </div>

      <div class="item">

        <div class="label">
          一言で表す
        </div>

        <div class="value">
          サーバに接続できない
        </div>

      </div>

    </div>

    <!-- 詳細 -->
    <div class="section">

      <div class="section-title">
        具体的な内容
      </div>

      <div class="value">
        サーバへのアクセスが断続的に失敗しており、
        業務システムにログインできない状態。

        午前9時頃から発生しており、原因は調査中。
      </div>

    </div>

    <!-- ボタン -->
    <div class="btn-area">

      <button class="btn btn-secondary" onclick="history.back()">

        修正する

      </button>

      <button class="btn" onclick="location.href='complete.html'">

        確認

      </button>

    </div>

  </div>

</body>

</html>

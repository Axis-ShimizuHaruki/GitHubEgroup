<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>トラブル編集</title>

	<style>

	</style>
</head>

<body>

	<!-- =========================
       ヘッダー
  ========================= -->

	<header>

		<!-- 上段 -->
		<div class="header-top">

			<!-- 左 -->
			<div class="logo-area">

				<a href="list.html">

					<img src="icon.png" alt="ロゴ" class="logo-img">

				</a>

			</div>

			<!-- 右 -->
			<div class="user-area">

				<span class="user-name">
					ログインユーザ：山田 太郎
				</span>

				<button class="logout-btn">
					ログアウト
				</button>

			</div>

		</div>

		<!-- 下段 -->
		<div class="page-title-bar">
			トラブル編集
		</div>

	</header>

	<div class="container">

		<!-- サマリー -->
		<div class="section">

			<div class="section-title">
				編集内容サマリー
			</div>

			<div class="summary-box">
				登録済みのトラブル内容を編集できます。<br>
				内容確認後、「保存」を押してください。
			</div>

		</div>


		<form th:action="@{/trouble/{id}/edit/confirm(id=${trouble.troubleId})}" method="post">

			<input type="hidden" name="troubleId" th:value="${trouble.troubleId}">

			<!-- トラブル内容 -->
			<div class="section">

				<div class="section-title">
					トラブル内容編集
				</div>

				<div class="grid-2">

					<div class="item">
						<div class="label">緊急度</div>


						<select name="priority">
							<option value="3" th:selected="${trouble.priority == 3}">高</option>
							<option value="2" th:selected="${trouble.priority == 2}">中</option>
							<option value="1" th:selected="${trouble.priority == 1}">低</option>
						</select>

					</div>

					<div class="item">
						<div class="label">トラブル種別</div>

						<select name="troubleType">
							<option value="1" th:selected="${trouble.troubleType == 1}">事故</option>
							<option value="2" th:selected="${trouble.troubleType == 2}">資材不足</option>
							<option value="3" th:selected="${trouble.troubleType == 3}">納品遅れ</option>
							<option value="4" th:selected="${trouble.troubleType == 4}">工程遅延</option>
							<option value="5" th:selected="${trouble.troubleType == 5}">その他</option>
						</select>
					</div>

				</div>

				<div class="item">
					<div class="label">一言で表す</div>

					<input type="text" name="overview" th:value="${trouble.overview}">
				</div>

			</div>

			<!-- 詳細 -->
			<div class="section">

				<div class="section-title">
					詳細内容
				</div>

				<div class="item">

					<textarea name="detail" th:text="${trouble.detail}">
				</textarea>

				</div>

			</div>

			<!-- 対応状況 -->
			<div class="section">

				<div class="section-title">
					対応状況
				</div>

				<div class="grid-2">

					<div class="item">
						<div class="label">現在の対応状況</div>

						<select>
							<option selected>調査中</option>
							<option>対応中</option>
							<option>復旧済み</option>
							<option>完了</option>
						</select>
					</div>

					<div class="item">
						<div class="label">管理者共有</div>

						<select>
							<option selected>共有済み</option>
							<option>未共有</option>
						</select>
					</div>

				</div>

				<div class="item">

					<div class="label">
						対応メモ
					</div>

					<textarea>
ネットワーク機器およびサーバログを確認中。
午前中に一次報告予定。
        </textarea>

				</div>

			</div>

			<!-- 確認ステータス -->
			<div class="section">

				<div class="section-title">
					確認ステータス
				</div>

				<div class="item">

					<div class="label">
						コメント
					</div>

					<textarea>
登録内容に問題がないことを確認してください。
必要に応じて管理者へ共有されます。
        </textarea>

				</div>

			</div>

			<!-- ボタン -->
			<div class="btn-area">



				<button type="button" class="btn btn-gray"
					th:onclick="|location.href='@{/trouble/{id}(id=${trouble.troubleId})}'|">
					キャンセル
				</button>
				<button type="submit" class="btn">
					保存
				</button>

			</div>

		</form>
	</div>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>トラブル一覧</title>
	<link rel="stylesheet" th:href="@{/css/trouble/troublelist.css}" />

	<style>

	</style>
</head>

<body>

	<!-- ===== ヘッダー ===== -->

	<header>

		<div class="header-top">

			<!-- 左：ロゴ -->
			<div class="logo-area">


				<!-- 本社 -->
				<a th:if="${session.loginUser.roll == 0}" th:href="@{/homeoffice}">
					<img th:src="@{/images/icon.png}" alt="ロゴ" class="logo-img">
				</a>

				<!-- 現場 -->
				<a th:if="${session.loginUser.roll == 1}" th:href="@{/homesite}">
					<img th:src="@{/images/icon.png}" alt="ロゴ" class="logo-img">
				</a>

				<!-- 現場閲覧者 -->
				<a th:if="${session.loginUser.roll == 2}" th:href="@{/homesite}">
					<img th:src="@{/images/icon.png}" alt="ロゴ" class="logo-img">
				</a>

			</div>

			<!-- 右：ユーザ -->
			<div class="user-area">

				<!-- ログイン中 -->
				<div th:if="${session.loginUser != null}">
					<span th:text="${session.loginUser.username}">
						ゲスト
					</span> さん
				</div>

				<form th:if="${session.loginUser != null}" th:action="@{/logout}" method="post">

					<button type="submit" class="logout-btn">
						ログアウト
					</button>

				</form>

				<!-- 未ログイン -->
				<div th:unless="${session.loginUser != null}">
					<a th:href="@{/login}" class="logout-btn">
						ログイン
					</a>
				</div>
			</div>

		</div>

		<!-- 下段タイトル -->
		<div class="page-title-bar">

			<div class="page-title-bar"
				style="display: flex; align-items: center; justify-content: flex-start; gap: 40px; padding: 0 20px;">

				<div class="header-site-name" style="font-weight: bold; font-size: 15px; color: #1f3c88;">

					<!-- 現場管理者・閲覧者 -->
					<span th:if="${session.loginUser.roll != 0}">
						<span th:each="s : ${siteList}" th:if="${siteId == session.siteId}" th:text="${siteName}">
							担当現場名
						</span>
					</span>

					<!-- 本社＋現場絞り込み -->
					<span th:if="${session.loginUser.roll == 0
					              && troubleSearchForm.siteName != null
					              && troubleSearchForm.siteName != ''}" th:text="${troubleSearchForm.siteName + '（絞り込み中）'}">
					</span>

					<!-- 本社＋全体表示 -->
					<span th:if="${session.loginUser.roll == 0
					              && (troubleSearchForm.siteName == null
					              || troubleSearchForm.siteName == '')}">
						全現場対象エリア
					</span>

				</div>

				<!-- ポータルへ戻る -->
				<div class="back-area" th:if="${portalSiteId != null}">
					<a th:href="@{/portal/{id}(id=${portalSiteId})}">
						現場ポータルへ戻る
					</a>
				</div>

				<a th:href="@{/trouble/list}" class="nav-link active"> トラブル一覧
				</a>

			</div>
		</div>

	</header>

	<!-- ===== メイン ===== -->

	<main>

		<!-- ===== 検索 ===== -->

		<form th:action="@{/trouble/list}" th:object="${troubleSearchForm}" method="get">

			<div class="search-area">

				<div class="search-item">
					<label class="search-label">日付</label>
					<input type="date" th:field="*{occurredDate}" class="search-input">
				</div>

				<div class="search-item">
					<label class="search-label">現場名</label>

					<select th:field="*{siteName}" class="search-select">
						<option value="">すべて</option>

						<option th:each="site : ${siteList}" th:value="${site.siteName}" th:text="${site.siteName}">
						</option>
					</select>
				</div>

				<div class="search-item">
					<label class="search-label">優先度</label>

					<select th:field="*{priority}" class="search-select">
						<option value="">すべて</option>
						<option value="3">高</option>
						<option value="2">中</option>
						<option value="1">低</option>
					</select>
				</div>

				<div class="search-item">
					<label class="search-label">種別</label>

					<select th:field="*{troubleType}" class="search-select">
						<option value="">すべて</option>
						<option value="1">転倒</option>
						<option value="2">機械故障</option>
						<option value="3">資材不足</option>
						<option value="4">その他</option>
					</select>
				</div>

				<div class="search-item">
					<label class="search-label">状況</label>

					<select th:field="*{statusFlag}" class="search-select">
						<option value="">すべて</option>
						<option value="0">未対応</option>
						<option value="1">対応中</option>
						<option value="2">完了</option>
					</select>
				</div>

				<div class="search-btn-area">

					<button type="submit" class="search-btn">
						検索
					</button>

					<input type="hidden" name="siteId" th:value="${portalSiteId}">

					<button type="button" th:onclick="|location.href='@{/trouble/list/reset}'|" class="search-btn">
						リセット
					</button>

				</div>

			</div>

		</form>

		<!-- ===== テーブル ===== -->

		<table class="issue-table">

			<thead>
				<tr>
					<th>登録日</th>
					<th>現場名</th>
					<th>優先度</th>
					<th>種別</th>
					<th>一言</th>
					<th>状況</th>
					<th>詳細</th>
				</tr>
			</thead>

			<tbody>
				<tr th:if="${#lists.isEmpty(troubleList)}">
					<td colspan="7"> 該当するトラブル情報はありません </td>
				</tr>
				<tr th:each="trouble : ${troubleList}">

					<td th:text="${#temporals.format(trouble.occurredAt,'yyyy/MM/dd')}"></td>

					<td th:text="${trouble.site.siteName}"></td>

					<td>
						<span class="badge high" th:if="${trouble.priority == 0}"> なし </span>
						<span class="badge high" th:if="${trouble.priority == 3}"> 高 </span>
						<span class="badge middle" th:if="${trouble.priority == 2}"> 中 </span>
						<span class="badge low" th:if="${trouble.priority == 1}"> 低 </span>
					</td>

					<td>
						<span th:if="${trouble.troubleType == 1}">事故</span>
						<span th:if="${trouble.troubleType == 2}">資材不足</span>
						<span th:if="${trouble.troubleType == 3}">納品遅れ</span>
						<span th:if="${trouble.troubleType == 4}">工程遅延</span>
						<span th:if="${trouble.troubleType == 5}">その他</span>
					</td>

					<td th:text="${trouble.overview}"></td>

					<td>
						<span th:if="${trouble.tStatusFlag == 0}"> 未対応 </span>
						<span th:if="${trouble.tStatusFlag == 1}"> 対応中 </span>
						<span th:if="${trouble.tStatusFlag == 2}"> 完了 </span>
					</td>

					<td>
						<a class="detail-btn" th:href="@{/trouble/{id}(
						        id=${trouble.troubleId},
						        portalSiteId=${portalSiteId}
						)}">
							詳細
						</a>
					</td>
				</tr>
			</tbody>

		</table>

	</main>

	<!-- ===== 左下ステータス ===== -->

	<!--	<div class="status-bubble">-->

	<!--		<div class="status-item">-->
	<!--			<span class="status-title">日報</span>-->
	<!--			<span class="done">✔ 作成済み</span>-->
	<!--		</div>-->

	<!--		<div class="status-item">-->
	<!--			<span class="status-title">安全点検</span>-->
	<!--			<span class="not-done blinking">-->
	<!--				⚠ 未作成-->
	<!--			</span>-->
	<!--		</div>-->

	<!--	</div>-->

</body>

</html>
